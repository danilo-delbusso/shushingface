name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: go build -tags webkit2_41 ./...

      - name: Vet
        run: go vet -tags webkit2_41 ./...

      - name: Test
        run: go test -tags webkit2_41 ./...

  frontend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Typecheck
        run: cd frontend && bun run tsc -b --noEmit

      - name: Lint
        run: cd frontend && bun run lint

      - name: Build
        run: cd frontend && bun run build

  licenses:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Check licenses are up to date
        run: |
          # Generate Go licenses
          go install github.com/google/go-licenses@latest
          echo "# Third-Party Licenses" > /tmp/licenses.md
          echo "" >> /tmp/licenses.md
          echo "## Assets" >> /tmp/licenses.md
          echo "" >> /tmp/licenses.md
          echo '- **OpenMoji** — [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)' >> /tmp/licenses.md
          echo '  All emojis designed by [OpenMoji](https://openmoji.org) — the open-source emoji and icon project.' >> /tmp/licenses.md
          echo "" >> /tmp/licenses.md
          echo "## Go Dependencies" >> /tmp/licenses.md
          echo "" >> /tmp/licenses.md
          go-licenses csv ./... 2>/dev/null | grep -v "codeberg.org/dbus/shushingface" | sort | while IFS=, read -r mod url license; do
            echo "- **$mod** — $license" >> /tmp/licenses.md
          done
          echo "" >> /tmp/licenses.md
          echo "## Frontend Dependencies" >> /tmp/licenses.md
          echo "" >> /tmp/licenses.md
          cd frontend && bun x license-checker --production --csv --excludePackages "frontend@0.0.0" 2>/dev/null | tail -n +2 | sort | while IFS=, read -r mod license repo; do
            mod=$(echo "$mod" | tr -d '"')
            license=$(echo "$license" | tr -d '"')
            echo "- **$mod** — $license" >> /tmp/licenses.md
          done
          cd ..
          diff -q THIRD_PARTY_LICENSES.md /tmp/licenses.md || (echo "THIRD_PARTY_LICENSES.md is out of date. Run 'just licenses' and commit." && exit 1)

name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  backend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-shushingface

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Load tool versions
        run: |
          source scripts/lib/versions.env
          echo "GO_VERSION=$GO_VERSION"     >> $GITHUB_ENV
          echo "BUN_VERSION=$BUN_VERSION"   >> $GITHUB_ENV
          echo "WAILS_VERSION=$WAILS_VERSION" >> $GITHUB_ENV

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Build
        run: go build -tags webkit2_41 ./...

      - name: Lint
        uses: https://github.com/golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --build-tags webkit2_41

      - name: Test
        run: go test -tags webkit2_41 ./...

  frontend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-shushingface

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Load tool versions
        run: |
          source scripts/lib/versions.env
          echo "BUN_VERSION=$BUN_VERSION" >> $GITHUB_ENV

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Typecheck
        run: cd frontend && bun run tsc -b --noEmit

      - name: Lint
        run: cd frontend && bun run lint

      - name: Build
        run: cd frontend && bun run build

  # Build-only on Windows. No tests — they need a GUI runtime. Requires a
  # self-hosted runner labeled `windows-shushingface`; if none exists,
  # this job will queue and skip but won't fail other jobs.
  build-windows:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-shushingface
    continue-on-error: true

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Load tool versions
        shell: bash
        run: |
          source scripts/lib/versions.env
          echo "GO_VERSION=$GO_VERSION"     >> $GITHUB_ENV
          echo "BUN_VERSION=$BUN_VERSION"   >> $GITHUB_ENV
          echo "WAILS_VERSION=$WAILS_VERSION" >> $GITHUB_ENV

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && bun install --frozen-lockfile

      - name: Build
        shell: bash
        run: just build


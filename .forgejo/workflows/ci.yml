name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache apt packages
        uses: https://github.com/awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev
          version: 1.0

      - name: Cache node_modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: go build -tags webkit2_41 ./...

      - name: Vet
        run: go vet -tags webkit2_41 ./...

      - name: Test
        run: go test -tags webkit2_41 ./...

  frontend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Typecheck
        run: cd frontend && bun run tsc -b --noEmit

      - name: Lint
        run: cd frontend && bun run lint

      - name: Build
        run: cd frontend && bun run build

  licenses:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache apt packages
        uses: https://github.com/awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev
          version: 1.0

      - name: Cache node_modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install just
        run: curl -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Check licenses are up to date
        run: just licenses-check

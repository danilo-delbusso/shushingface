name: CI

on:
  push:
  pull_request:

env:
  APT_PACKAGES: libwebkit2gtk-4.1-dev libgtk-3-dev

jobs:
  backend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache apt packages
        uses: https://github.com/actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ env.APT_PACKAGES }}

      - name: Install system dependencies
        run: |
          if [ -d ~/apt-cache ] && ls ~/apt-cache/*.deb 1>/dev/null 2>&1; then
            sudo dpkg -i ~/apt-cache/*.deb 2>/dev/null || sudo apt-get install -y -f
          else
            sudo apt-get update && sudo apt-get install -y $APT_PACKAGES
            mkdir -p ~/apt-cache
            cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true
          fi

      - name: Cache bun dependencies
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Build
        run: go build -tags webkit2_41 ./...

      - name: Vet
        run: go vet -tags webkit2_41 ./...

      - name: Test
        run: go test -tags webkit2_41 ./...

  frontend:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Typecheck
        run: cd frontend && bun run tsc -b --noEmit

      - name: Lint
        run: cd frontend && bun run lint

      - name: Build
        run: cd frontend && bun run build

  licenses:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache apt packages
        uses: https://github.com/actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ env.APT_PACKAGES }}

      - name: Install system dependencies
        run: |
          if [ -d ~/apt-cache ] && ls ~/apt-cache/*.deb 1>/dev/null 2>&1; then
            sudo dpkg -i ~/apt-cache/*.deb 2>/dev/null || sudo apt-get install -y -f
          else
            sudo apt-get update && sudo apt-get install -y $APT_PACKAGES
            mkdir -p ~/apt-cache
            cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true
          fi

      - name: Cache bun dependencies
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Check licenses are up to date
        run: ./scripts/check-licenses.sh

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X codeberg.org/dbus/shushingface/internal/version.version=$VERSION"
          wails build -tags webkit2_41 -ldflags "$LDFLAGS"

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          tar czf "dist/shushingface-${VERSION}-linux-amd64.tar.gz" \
            -C build/bin shushingface \
            -C ../../build/linux shushingface.desktop \
            -C .. appicon.png

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s" >> CHANGELOG.md
          fi

      - name: Create release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: dist/*

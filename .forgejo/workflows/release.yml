name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APT_PACKAGES: libwebkit2gtk-4.1-dev libgtk-3-dev

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2

      - name: Cache apt packages
        uses: https://github.com/actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ env.APT_PACKAGES }}

      - name: Install system dependencies
        run: |
          if [ -d ~/apt-cache ] && ls ~/apt-cache/*.deb 1>/dev/null 2>&1; then
            sudo dpkg -i ~/apt-cache/*.deb 2>/dev/null || sudo apt-get install -y -f
          else
            sudo apt-get update && sudo apt-get install -y $APT_PACKAGES
            mkdir -p ~/apt-cache
            cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true
          fi

      - name: Cache bun dependencies
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build and package
        run: ./scripts/build-release.sh "${GITHUB_REF#refs/tags/}"

      - name: Generate changelog
        run: ./scripts/generate-changelog.sh CHANGELOG.md

      - name: Create release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          url: https://codeberg.org
          token: ${{ secrets.RELEASE_TOKEN }}
          tag: ${{ github.ref_name }}
          release-dir: dist
          release-notes: CHANGELOG.md

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-shushingface

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Cache bun modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build and package
        run: ./scripts/build-release.sh "${GITHUB_REF#refs/tags/}"

      - name: Generate changelog
        run: ./scripts/generate-changelog.sh CHANGELOG.md

      - name: Create release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          url: https://codeberg.org
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          release-dir: dist
          release-notes: CHANGELOG.md

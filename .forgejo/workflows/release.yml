name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-shushingface

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load tool versions
        run: |
          source scripts/lib/versions.env
          echo "GO_VERSION=$GO_VERSION"     >> $GITHUB_ENV
          echo "BUN_VERSION=$BUN_VERSION"   >> $GITHUB_ENV
          echo "WAILS_VERSION=$WAILS_VERSION" >> $GITHUB_ENV

      - name: Set up Go
        uses: https://github.com/actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Bun
        uses: https://github.com/oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun modules
        uses: https://github.com/actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Build and package
        run: just package
        env:
          VERSION: ${{ github.ref_name }}

      - name: Generate changelog
        run: ./scripts/release/changelog.sh CHANGELOG.md

      - name: Create release
        run: ./scripts/release/create-release.sh "${{ github.ref_name }}" "${{ secrets.GITHUB_TOKEN }}"
